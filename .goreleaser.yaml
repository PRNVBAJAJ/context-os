version: 2

project_name: context

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: context
    main: ./cmd/context
    binary: context
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/PRNVBAJAJ/context-os/internal/shared.Version={{.Version}}
    mod_timestamp: "{{.CommitTimestamp}}"

archives:
  - id: context
    builds:
      - context
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - CONTRIBUTING.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{incpatch .Version}}-dev"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^Merge"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug fixes
      regexp: "^fix"
      order: 1
    - title: Refactoring
      regexp: "^refactor"
      order: 2
    - title: Other
      order: 999

brews:
  - name: context
    directory: Formula
    repository:
      owner: PRNVBAJAJ
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/PRNVBAJAJ/context-os"
    description: "Local-first runtime for AI-assisted engineering"
    license: "MIT"
    install: |
      bin.install "context"
    test: |
      system "#{bin}/context", "--version"

release:
  github:
    owner: PRNVBAJAJ
    name: context-os
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
