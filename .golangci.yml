version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - noctx
    - exhaustive

linters-settings:
  errcheck:
    # fmt.Fprint* writes to cobra stdout/stderr; I/O errors there are not actionable.
    exclude-functions:
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln
  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    # nolint directives on test cleanup functions (os.Chdir) are intentional.
    - path: "_test\\.go"
      linters:
        - errcheck
      text: "os\\.Chdir"
