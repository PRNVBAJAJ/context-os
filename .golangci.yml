version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - noctx
    - exhaustive

linters-settings:
  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    # nolint directives on test cleanup functions (os.Chdir) are intentional.
    - path: "_test\\.go"
      linters:
        - errcheck
      text: "os\\.Chdir"
    # fmt.Fprint* writes to cobra's stdout/stderr; I/O errors there are not actionable.
    - source: "fmt\\.F(print|printf|println)"
      linters:
        - errcheck
